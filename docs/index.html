  var secondaryCellBg = mode==='top' ? 'rgba(201,150,14,.05)' : 'rgba(8,126,139,.06)';
  var labelMode = mode==='top' ? 'Más Probable' : 'Max Pts.';

  document.getElementById('vh-title').textContent = modelDisplayName(modelId);
  document.getElementById('vh-sub').textContent = 'Torneo 2026 · '+labelMode+' · '+playedN+' partidos jugados';
  document.getElementById('vh-result').textContent = selectedPts+'/'+maxPts;
  document.getElementById('vh-bestinfo').innerHTML =
    'Click en cerrar para salir · 1X2: <strong>'+totals.outHits+'/'+playedN+'</strong> ('+(playedN?((totals.outHits/playedN)*100).toFixed(1):'0.0')+'%)<br>'+
    'Prob. media asignada al resultado real: <strong>'+fmtPctNum(avgPReal)+'</strong>';
  document.getElementById('vh-summary').innerHTML =
    '<div class="vh-summary">'+
      '<div class="vh-kpi"><div class="vh-kpi-l">'+labelMode+'</div><div class="vh-kpi-v">'+selectedPts+'/'+maxPts+'</div></div>'+
      '<div class="vh-kpi"><div class="vh-kpi-l">Exactos</div><div class="vh-kpi-v">'+selectedExact+'/'+playedN+'</div></div>'+
      '<div class="vh-kpi"><div class="vh-kpi-l">Aciertos</div><div class="vh-kpi-v">'+selectedHits+'/'+playedN+'</div></div>'+
      '<div class="vh-kpi"><div class="vh-kpi-l">Error xG</div><div class="vh-kpi-v">'+(avgXgErr===null?'--':avgXgErr.toFixed(2))+'</div></div>'+
    '</div>'+
    '<div class="vh-mini">1X2 compara la salida más probable del modelo contra el resultado real. P(real) indica cuánta probabilidad puso el modelo en la salida que terminó ocurriendo. Error xG = |xG local - goles local| + |xG visitante - goles visitante|.</div>';
  document.querySelector('#val-hover .vh-tbl thead').innerHTML =
    '<tr><th>#</th><th>Partido</th><th>Real</th><th style="background:'+primaryBg+'">'+primaryLabel+'</th><th style="background:'+primaryBg+'">Pts</th><th style="background:'+secondaryBg+'">'+secondaryLabel+'</th><th style="background:'+secondaryBg+'">Pts</th><th>1X2</th><th>xG / Err</th></tr>';

  var rows = '';
  rowsData.forEach(function(r, i){

function _quinielaStats(){
  var sv = _scoringValues();
  var pts=0, exact=0, margin=0, winner=0, miss=0, played=0;
  DATA.matches.forEach(function(m){
    if(!m.result) return;
    played++;
    var bq = bestQuiniela(m);
    var p = calcMatchPoints(bq.score, m.result);
    if(p===null) p=0;
    pts += p;
    if(p===sv.exact) exact++;
    else if(p===sv.margin) margin++;
    else if(p===sv.winner) winner++;
    else miss++;
  });
  var max = played * sv.exact;
  return { pts:pts, max:max, exact:exact, margin:margin, winner:winner, miss:miss, played:played, eff: max>0 ? (pts/max*100).toFixed(0)+'%' : '—' };
}

/* ══════════════════ CURRENT TOURNAMENT RANKING ══════════════════ */

/**
 * Calcula puntos de quiniela para un pick dado un resultado real.
 * Regla 5/3/1/0:
 *   5 pts → marcador exacto
 *   3 pts → diferencia de goles igual (margen) o empate distinto
 *   1 pt  → ganador correcto (1X2)
 *   0 pts → fallo total
 *
 * Datos necesarios en DATA.matches[i]:
 *   result  {string|null}  — marcador real, p.ej. "2-1", o null si no jugado
 *
 * Datos necesarios en DATA.matches[i].models[j]:
 *   score   {string}       — pick Max Puntos del modelo, p.ej. "1-0"
 *   top     {string}       — pick Más Probable del modelo, p.ej. "1-1"
 *
 * Para añadir resultados reales cuando se jueguen los partidos,
 * simplemente cambia result:null por result:"X-Y" en el objeto del partido.
 * El ranking se recalcula automáticamente en cada renderValidacion().
 */
function _scoringValues(){
  var cfg = SCORING_PROFILES[SCORING_ACTIVE] || {};
  return { exact: cfg.exact_score || 5, margin: cfg.same_margin_or_draw != null ? cfg.same_margin_or_draw : 3, winner: cfg.winner || 1 };
}
function _ptsCls(p){
  var sv=_scoringValues();
  return p===sv.exact?'fr-p5':p===sv.margin?'fr-p3':p===sv.winner?'fr-p1':'fr-p0';
}
function calcMatchPoints(pick, result){
  if(!result || !pick || pick==='—') return null;
  var pp = pick.split('-').map(Number);
  var rp = result.split('-').map(Number);
  if(isNaN(pp[0])||isNaN(pp[1])||isNaN(rp[0])||isNaN(rp[1])) return null;
  var sv = _scoringValues();
  if(pick===result) return sv.exact;
  if(pp[0]-pp[1] === rp[0]-rp[1]) return sv.margin;
  var po = pp[0]>pp[1]?'1':pp[0]<pp[1]?'2':'X';
  var ro = rp[0]>rp[1]?'1':rp[0]<rp[1]?'2':'X';
  return po===ro ? sv.winner : 0;
}

/**
 * Agrega puntos del torneo actual por modelo.
 * Itera sobre DATA.matches con result !== null.
 * Retorna array de objetos por modelo con:
 *   pts_score, pts_top, hits_score, hits_top, exact_score, exact_top, played
 */
function buildCurrentRankData(){
  var played = DATA.matches.filter(function(m){ return m.result!==null; });
  var modMap = {};
  var refMatch = DATA.matches.find(function(m){ return (m.models||[]).length>0; }) || DATA.matches[0];
  (refMatch.models||[]).forEach(function(mod){
    modMap[mod.id] = {
      id:mod.id, label:mod.family, fb:mod.fb,
      pts_score:0, pts_top:0,
      hits_score:0, hits_top:0,
      exact_score:0, exact_top:0,
      played:0
    };
  });
  played.forEach(function(m){
    m.models.forEach(function(mod){
      if(!modMap[mod.id]) return;
      var ps = calcMatchPoints(mod.score, m.result);
      var pt = calcMatchPoints(mod.top,   m.result);
      if(ps!==null){
        modMap[mod.id].pts_score += ps;
        if(ps>0) modMap[mod.id].hits_score++;
        if(ps===_scoringValues().exact) modMap[mod.id].exact_score++;
        modMap[mod.id].played++;
      }
      if(pt!==null){
        modMap[mod.id].pts_top += pt;
        if(pt>0) modMap[mod.id].hits_top++;
        if(pt===_scoringValues().exact) modMap[mod.id].exact_top++;
      }
    });
  });
  return Object.values(modMap);
}

/**
 * Construye las filas HTML del ranking del torneo actual.
 * Estado vacío (0 partidos jugados): muestra todos los modelos con "—"

  /* ── Estado vacío: torneo sin resultados aún ── */

    var rows = '';

            + '</div>';
      rows += '</div>';
    });
    return rows;
  }

  /* ── Con partidos jugados: ranking real ── */
  var sorted = data.slice().sort(function(a,b){
    return (b.pts_score-a.pts_score) || (b.exact_score-a.exact_score) || (b.hits_score-a.hits_score);
  });
  var maxV = Math.max(1, sorted[0].pts_score);
  var maxPts = playedCount * _scoringValues().exact;

  var rows = '';
  sorted.forEach(function(m,i){
    var barW = (m.pts_score/maxV*100).toFixed(1);

    rows += '<div class="rankrow">';
    rows += '<span class="rn">'+(i+1)+'</span>';
    rows += '<div class="rinfo">';
    rows += '<div class="rmod"><span style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1">'+m.id.replace(/_/g,' ')+'</span>'
          + '<span class="fb '+m.fb+'" style="font-size:8px;flex-shrink:0">'+m.label+'</span></div>';
    rows += '<div class="rbar-bg"><div class="rbar" style="width:'+barW+'%;'
          + 'background:linear-gradient(90deg,var(--grn),var(--teal))"></div></div>';
    rows += '<div class="reff">'
          + m.hits_score+' aciertos · '+m.exact_score+' exactos'
          + ' · Ef. '+eff+'%'
          + ' <span style="color:var(--mutl)">· Prob: '+m.pts_top+' pts</span>'
          + '</div>';
    rows += '</div>';
    rows += '<div class="rpts">';
    rows += '<div class="rpts-v" style="color:var(--grn)">'+m.pts_score+'</div>';
    rows += '<div class="rpts-l">/ '+maxPts+' pts</div>';
    rows += '<div class="rpts-ex">'+m.exact_score+'<span style="font-size:10px;color:var(--mutl);font-weight:400"> / '+playedCount+' ex.</span></div>';
    rows += '</div></div>';
  });
  return rows;
}

function _build2026RankRows(data, mode, maxPts){
  var ptsKey = mode==='top' ? 'pts_top' : 'pts_score';
  var hitsKey = mode==='top' ? 'hits_top' : 'hits_score';
  var exKey = mode==='top' ? 'exact_top' : 'exact_score';
  var sorted = data.slice().sort(function(a,b){
    return (b[ptsKey]-a[ptsKey]) || (b[exKey]-a[exKey]) || (b[hitsKey]-a[hitsKey]);
  });
  var maxV = Math.max(1, sorted[0][ptsKey]);
  var grad = mode==='top' ? 'var(--teal),var(--blu)' : 'var(--grn),var(--teal)';
  var rows = '';
  sorted.forEach(function(m,i){
    var pts = m[ptsKey];
    var barW = (pts/maxV*100).toFixed(1);
    var eff  = maxPts>0 ? (pts/maxPts*100).toFixed(1) : '0.0';
    rows += '<div class="rankrow clickable" onclick="showCurrentModelHover(\''+m.id+'\',\''+mode+'\',this)" title="Ver comparacion contra resultados reales">';
    rows += '<span class="rn">'+(i+1)+'</span>';
    rows += '<div class="rinfo">';
    rows += '<div class="rmod"><span style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1">'+m.id.replace(/_/g,' ')+'</span>'
          + '<span class="fb '+m.fb+'" style="font-size:8px;flex-shrink:0">'+m.label+'</span></div>';
    rows += '<div class="rbar-bg"><div class="rbar" style="width:'+barW+'%;background:linear-gradient(90deg,'+grad+')"></div></div>';
    rows += '<div class="reff">'+m[hitsKey]+' aciertos · '+m[exKey]+' exactos · Ef. '+eff+'%</div>';
    rows += '</div>';
    rows += '<div class="rpts">';
    rows += '<div class="rpts-v" style="color:'+(mode==='top'?'var(--teal)':'var(--grn)')+'">'+pts+'</div>';
    rows += '<div class="rpts-l">/ '+maxPts+' pts</div>';
    rows += '</div></div>';
  });
  return rows;
}

/* ══════════════════ RENDER: VALIDACIÓN ══════════════════ */
function buildRankRows(metrics, useProb){
  var sorted = metrics.slice().sort(function(a,b){ return useProb ? b.pts_prob-a.pts_prob : b.pts-a.pts; });
  var maxV = sorted.reduce(function(m,r){ return Math.max(m, useProb?r.pts_prob:r.pts); }, 0);
  var totalMatches = sorted[0] ? sorted[0].max/5 : 62;
  var rows = '';
  sorted.forEach(function(m,i){
    var pts = useProb ? m.pts_prob : m.pts;
    var eff = useProb ? m.eff_prob : m.eff;
    var ex  = useProb ? m.exact_prob : m.exact;
    var barW = maxV > 0 ? (pts/maxV*100).toFixed(1) : 0;
    rows += '<div class="rankrow">';
    rows += '<span class="rn">'+(i+1)+'</span>';
    rows += '<div class="rinfo">';
    rows += '<div class="rmod"><span style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1">'+m.model.replace(/_/g,' ')+'</span><span class="fb '+m.fb+'" style="font-size:8px;flex-shrink:0">'+m.label+'</span>'+(m.is_ref?'<span class="ref-badge" style="flex-shrink:0">Ref.</span>':'')+'</div>';
    rows += '<div class="rbar-bg"><div class="rbar" style="width:'+barW+'%"></div></div>';
    rows += '<div class="reff">Ef. '+(eff*100).toFixed(1)+'% <span style="color:var(--mutl);font-size:9px">(exact. '+(ex/totalMatches*100).toFixed(1)+'%)</span> · 1X2: '+m.winner+'</div>';
    rows += '</div>';
    rows += '<div class="rpts">';
    rows += '<div class="rpts-v">'+pts+'</div>';
    rows += '<div class="rpts-l">/ '+m.max+' pts</div>';
    rows += '<div class="rpts-ex">'+ex+'<span style="font-size:10px;color:var(--mutl);font-weight:400"> / '+totalMatches+' ex.</span></div>';
    rows += '</div></div>';
  });
  return rows;
}

var _frHovTimer = null;

function getFrModels(){
  try{ return JSON.parse(localStorage.getItem('q2026_amigos_models')||'[]'); }
  catch(e){ return []; }
}
function setFrModels(arr){ localStorage.setItem('q2026_amigos_models', JSON.stringify(arr)); }

function toggleFrModel(modelId){
  var curr = getFrModels();
  var idx = curr.indexOf(modelId);
  if(idx>=0) curr.splice(idx,1); else curr.push(modelId);
  setFrModels(curr);
  renderAmigos();
}

/* Calcula ranking de amigos + modelos seleccionados */
function buildFriendsRank(){
  var friends   = (DATA.friends || []).filter(function(f){ return Object.keys(f.picks||{}).length>0; });
  var selModels = getFrModels();
  var played    = DATA.matches.filter(function(m){ return m.result!==null; });
  var participants = [];

  friends.forEach(function(f){
    var pts=0, exact=0, margin=0, winner=0;
    played.forEach(function(m){
      var pick = (f.picks||{})[String(m.id)];
      if(!pick) return;
      var p = calcMatchPoints(pick, m.result);
      var _sv=_scoringValues();
      if(p===_sv.exact){pts+=p;exact++;}
      else if(p===_sv.margin){pts+=p;margin++;}
      else if(p===_sv.winner){pts+=p;winner++;}
    });
    participants.push({
      id:f.id, name:f.name, isModel:false, fb:'fb-friend', label:'Participante',
      pts:pts, exact:exact, margin:margin, winner:winner,
      total:Object.keys(f.picks||{}).length
    });
  });

  selModels.forEach(function(modelId){
    if(!DATA.matches[0]) return;
    var modInfo = (DATA.matches.find(function(_m){return(_m.models||[]).length>0;})||DATA.matches[0]).models.find(function(m){ return m.id===modelId; });
    if(!modInfo) return;
    var pts=0, exact=0, margin=0, winner=0;
    played.forEach(function(m){
      var mod = m.models.find(function(md){ return md.id===modelId; });
      if(!mod) return;
      var p = calcMatchPoints(mod.score, m.result);
      var _sv=_scoringValues();
      if(p===_sv.exact){pts+=p;exact++;}
      else if(p===_sv.margin){pts+=p;margin++;}
      else if(p===_sv.winner){pts+=p;winner++;}
    });
    participants.push({
      id:modelId, name:modelId.replace(/_/g,' '), isModel:true,
      fb:modInfo.fb, label:modInfo.family,
      pts:pts, exact:exact, margin:margin, winner:winner,
      total:DATA.matches.length
    });
  });

  participants.sort(function(a,b){
    return (b.pts-a.pts)||(b.exact-a.exact)||(b.margin-a.margin);
  });
  return participants;
}

/* Chips de selección de modelos (reutilizado en home y en amigos) */
function buildFrChips(){
  var allModels = (DATA.matches[0] ? (DATA.matches.find(function(_m){return(_m.models||[]).length>0;})||DATA.matches[0]).models : []).slice();
  var btMap = {};
  (DATA.backtest.metrics||[]).forEach(function(bm){ btMap[bm.model]=bm.pts; });
  allModels.sort(function(a,b){
    var pa=btMap[a.id]!=null?btMap[a.id]:-1;
    var pb=btMap[b.id]!=null?btMap[b.id]:-1;
    return pb-pa;
  });
  var selModels = getFrModels();
  return allModels.map(function(mod){
    var isSel = selModels.indexOf(mod.id)>=0;
    var pts = btMap[mod.id];
    var ptsBadge = pts!=null?' <span style="font-size:8px;opacity:.6">'+pts+'p</span>':'';
    return '<span class="fr-chip'+(isSel?' fr-sel-on':'')+'" onclick="toggleFrModel(\''+esc(mod.id)+'\')">'
         + '<span class="fb '+mod.fb+'" style="font-size:8px">'+esc(mod.label)+'</span>'
         + esc(mod.id.replace(/_/g,' '))+ptsBadge+'</span>';
  }).join('');
}

function renderAmigos(){
  var el = document.getElementById('sec-amigos');
  if(!el) return;
  var friendsRaw = DATA.friends || [];
  var friends = friendsRaw.filter(function(f){ return Object.keys(f.picks||{}).length>0; });
  var played  = DATA.matches.filter(function(m){ return m.result!==null; });
  var rank    = buildFriendsRank();
  var maxPts  = played.length*5 || 1;
  var maxV    = rank.length>0 ? Math.max(1, rank[0].pts) : 1;
  var selMods = getFrModels();

  /* ── KPIs ── */
  var kpis =
    '<div class="krow">'
    +'<div class="kpi"><div class="kpi-l">Con picks</div><div class="kpi-v">'+friends.length+'</div></div>'
    +'<div class="kpi"><div class="kpi-l">Sin picks</div><div class="kpi-v">'+( friendsRaw.length - friends.length)+'</div></div>'
    +'<div class="kpi"><div class="kpi-l">Con modelo</div><div class="kpi-v t">'+selMods.length+'</div></div>'
    +'<div class="kpi"><div class="kpi-l">Partidos jugados</div><div class="kpi-v">'+played.length+'</div></div>'
    +'</div>';

  /* ── Aviso si no hay participantes con picks ── */

    ? '<div class="warnbox">ℹ️ &nbsp;Conecta la hoja de Google Sheets y corre <code>python scripts/build_friends_quinielas.py</code>.</div>'
    : friends.length===0
      ? '<div class="warnbox">ℹ️ &nbsp;Ningún participante ha registrado pronósticos aún. Cuando alguien llene la hoja, aparecerá aquí automáticamente.</div>'
      : '';

  /* ── Selector de modelos ── */

    +'<div class="fr-sel"><div class="fr-sel-t">Selecciona modelos para añadir al ranking</div>'

    rank.forEach(function(p,i){

        +'<span class="fr-rn">'+(i+1)+'</span>'
        +'<div style="flex:1;min-width:0;display:flex;align-items:center;gap:6px">'
        +'<span class="fr-rname">'+esc(p.name)+'</span>'+tag
        +'<div class="fr-rbar-bg"><div class="fr-rbar" style="width:'+barW+'%"></div></div>'
        +'</div>'
        +'<span class="fr-rstat">'+p.exact+' ex · '+p.margin+' mg · '+p.winner+' gn</span>'
        +'<span class="fr-reff">'+eff+'%</span>'
        +'<span class="fr-rpts">'+ptsDisp+'</span>'
        +'</div>';
    });
  }

  var rankBlock =
    '<div class="sdiv"><div class="sdiv-t">Ranking en vivo</div><div class="sdiv-l"></div></div>'

  var tblBlock = (friends.length>0||selModObjs.length>0)

      +'</tr></thead><tbody>'+tRows+'</tbody></table></div>'
    : '';

  el.innerHTML =
    '<div class="pg-hd"><div class="pg-title">Quiniela Amigos</div>'
    +'<div class="pg-sub">'+friends.length+' con picks · '+friendsRaw.length+' total · '+played.length+' partido'+(played.length!==1?'s':'')+' jugado'+(played.length!==1?'s':'')+'</div></div>'
    +kpis+warn+selBlock+rankBlock+tblBlock;

/* ── Friend / Model hover ── */
function showFrHover(participantId, isModel, triggerEl){
  clearTimeout(_frHovTimer);
  var picks = {};
  var name  = participantId;

  if(!isModel){
    var friend = (DATA.friends||[]).find(function(f){ return f.id===participantId; });
    if(friend){ name=friend.name; picks=friend.picks||{}; }
  } else {
    name = participantId.replace(/_/g,' ');
    DATA.matches.forEach(function(m){
      var mod = m.models.find(function(md){ return md.id===participantId; });
      if(mod) picks[String(m.id)] = mod.score;
    });
  }

  var played = DATA.matches.filter(function(m){ return m.result!==null; });
  var totalPts=0, exact=0, margin=0, winner=0;
  played.forEach(function(m){
    var pick = picks[String(m.id)];
    if(!pick) return;
    var p = calcMatchPoints(pick, m.result);
    var _sv=_scoringValues();
    if(p===_sv.exact){totalPts+=p;exact++;}
    else if(p===_sv.margin){totalPts+=p;margin++;}
    else if(p===_sv.winner){totalPts+=p;winner++;}
  });

  var rows = DATA.matches.filter(function(m){
    return picks[String(m.id)];
  }).map(function(m){
    var pick = picks[String(m.id)];
    var pts  = m.result ? calcMatchPoints(pick, m.result) : null;
    var cls  = pts!==null?_ptsCls(pts):'fr-pnd';
    var pDisp = pts!==null ? String(pts) : '';
    return '<div class="fr-hv-row">'
      +'<span class="fr-hv-match">'+esc(m.home)+' - '+esc(m.away)+'</span>'
      +'<span class="fr-hv-pick '+cls+'">'+esc(pick)+'</span>'
      +'<span class="fr-hv-res">'+(m.result||'—')+'</span>'
      +'<span class="fr-hv-pts-cell '+cls+'">'+pDisp+'</span>'
      +'</div>';
  }).join('');

  document.getElementById('fr-hv-name').textContent = name;
  document.getElementById('fr-hv-pts').textContent  = played.length>0 ? totalPts+' pts' : '';
  document.getElementById('fr-hv-stats').innerHTML  =
    '<span>✅ '+exact+' exactos</span>'
    +'<span>〰 '+margin+' margen</span>'
    +'<span>🎯 '+winner+' ganador</span>';
  document.getElementById('fr-hv-body').innerHTML = rows || '<div style="padding:14px;color:var(--mut);font-size:12px;text-align:center">Sin pronósticos registrados</div>';

  var hp = document.getElementById('fr-hover');
  hp.style.display = 'block';
  _frHovActive = true;

  if(triggerEl){
    var rect = triggerEl.getBoundingClientRect();
    hp.style.top = Math.min(rect.top, window.innerHeight-420)+'px';
  }
}

function schedFrClose(){
  _frHovActive = false;
  _frHovTimer = setTimeout(function(){
    if(!_frHovActive) document.getElementById('fr-hover').style.display='none';
  }, 220);
}

/* ══════════════════ COUNTDOWN ══════════════════ */
function startCountdown(){
  var target = new Date('2026-06-11T13:00:00-06:00');
  function tick(){
    var el = document.getElementById('cd-timer');
    if(!el) return;
    var diff = target - new Date();
    if(diff <= 0){ el.innerHTML = '<div class="cd-unit"><div class="cd-val" style="color:var(--cor)">EN VIVO</div></div>'; return; }
    var d = Math.floor(diff/86400000);
    var h = Math.floor((diff%86400000)/3600000);
    var mn = Math.floor((diff%3600000)/60000);
    var s = Math.floor((diff%60000)/1000);
    el.innerHTML =
      '<div class="cd-unit"><div class="cd-val">'+d+'</div><div class="cd-ul">Días</div></div>'+
      '<div class="cd-sep">:</div>'+
      '<div class="cd-unit"><div class="cd-val">'+String(h).padStart(2,'0')+'</div><div class="cd-ul">Horas</div></div>'+
      '<div class="cd-sep">:</div>'+
      '<div class="cd-unit"><div class="cd-val">'+String(mn).padStart(2,'0')+'</div><div class="cd-ul">Min</div></div>'+
      '<div class="cd-sep">:</div>'+
      '<div class="cd-unit"><div class="cd-val">'+String(s).padStart(2,'0')+'</div><div class="cd-ul">Seg</div></div>';
  }
  tick(); setInterval(tick, 1000);
}

/* ══════════════════ SOÑADORA: SIMULACIÓN ══════════════════ */
function _sonAvg(match, modelIds){
  var preds=(match.models||[]).filter(function(m){return modelIds.indexOf(m.id)>=0;});
  if(!preds.length) preds=match.models||[];
  if(!preds.length) return {p1:.34,px:.33,p2:.33,preds:[]};
  var p1=0,px=0,p2=0;
  preds.forEach(function(m){p1+=m.p1||0;px+=m.px||0;p2+=m.p2||0;});
  return {p1:p1/preds.length,px:px/preds.length,p2:p2/preds.length,preds:preds};
}
function _sonSim(match, modelIds, allowDraw){
  var a=_sonAvg(match,modelIds);
  var out=allowDraw
    ?(a.p1>=a.px&&a.p1>=a.p2?'H':a.px>=a.p1&&a.px>=a.p2?'D':'A')
    :(a.p1>=a.p2?'H':'A');
  var best=a.preds.filter(function(m){
    var p=m.score.split('-'),h=+p[0],g=+p[1];
    return (h>g?'H':h<g?'A':'D')===out;
  }).sort(function(a,b){return b.conf-a.conf;})[0]
   ||a.preds.sort(function(a,b){return b.conf-a.conf;})[0];
  var pts=(best?best.score:(out==='H'?'1-0':out==='D'?'0-0':'0-1')).split('-');
  var hg=+pts[0]||0,ag=+pts[1]||0;
  if(out==='H'&&hg<=ag) hg=ag+1;
  else if(out==='A'&&ag<=hg) ag=hg+1;
  else if(out==='D'){var avg=Math.ceil((hg+ag)/2);hg=avg;ag=avg;}
  return {hg:hg,ag:ag,out:out};
}
/* Simulación solo con picks de amigo — sin fallback de modelo.
   Devuelve {standings, results, thirds, champion, incomplete}.
   incomplete=true si los grupos no están completos y no se puede resolver eliminatoria. */
function runSonFriendSimulation(friendPickMap){
  var results={}, standings={}, teamStats={};
  DATA.matches.filter(function(m){return m.phase==='group';}).forEach(function(m){
    ['home','away'].forEach(function(s){
      if(!teamStats[m[s]]) teamStats[m[s]]={team:m[s],pts:0,gf:0,ga:0,gd:0,group:m.group,played:0};
    });
    var pickStr=friendPickMap[String(m.id)]||friendPickMap[String(m.num)];
    if(!pickStr) return; // partido no pronosticado: no cuenta
    var pp=pickStr.split('-');
    var hg=parseInt(pp[0],10)||0, ag=parseInt(pp[1],10)||0;
    var out=hg>ag?'H':hg<ag?'A':'D';
    results[m.id]={hg:hg,ag:ag,out:out};
    var h=teamStats[m.home],a=teamStats[m.away];
    h.gf+=hg;h.ga+=ag;h.gd+=hg-ag;h.played++;
    a.gf+=ag;a.ga+=hg;a.gd+=ag-hg;a.played++;
    if(out==='H'){h.pts+=3;}else if(out==='D'){h.pts++;a.pts++;}else{a.pts+=3;}
  });
  // Só incluir grupos con al menos 1 partido pronosticado
  Object.values(teamStats).forEach(function(t){
    if(!standings[t.group]) standings[t.group]=[];
    standings[t.group].push(t);
  });
  Object.keys(standings).forEach(function(g){
    standings[g].sort(function(a,b){return (b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf);});
  });
  // Verificar si todos los grupos tienen los 3 partidos de cada equipo completos
  var allGroups=12;
  var complete=Object.keys(standings).length===allGroups&&
    Object.values(standings).every(function(grp){
      return grp.length===4&&grp.every(function(t){return t.played===3;});
    });
  var thirds=[], usedT={};
  if(complete){
    thirds=Object.keys(standings).map(function(g){
      return Object.assign({},standings[g][2],{group:g});
    }).sort(function(a,b){return (b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf);}).slice(0,8);
    function resolve2(name){
      if(!name) return '?';
      var m2;
      m2=name.match(/^Winner Group ([A-L])$/);
      if(m2) return ((standings[m2[1]]||[])[0]||{}).team||name;
      m2=name.match(/^Runner-up Group ([A-L])$/);
      if(m2) return ((standings[m2[1]]||[])[1]||{}).team||name;
      m2=name.match(/^3rd Group (.+)$/);
      if(m2){
        var eligible=m2[1].split('/');
        for(var i=0;i<thirds.length;i++){
          if(eligible.indexOf(thirds[i].group)>=0&&!usedT[thirds[i].team]){
            usedT[thirds[i].team]=true; return thirds[i].team;
          }
        }
        return name;
      }
      m2=name.match(/^Winner Match (\d+)$/);
      if(m2){var r2=results[+m2[1]];return r2?r2.winner||name:name;}
      return name;
    }
    // Usar el mejor modelo disponible para elimineatorias (amigo no tiene picks de esa fase)
    var bestMod=[_cachedBestModelId()];
    ['r32','r16','qf','sf','third','final'].forEach(function(phase){
      DATA.matches.filter(function(m){return m.phase===phase;}).forEach(function(m){
        var ht=resolve2(m.home),at=resolve2(m.away);
        var r=_sonSim(m,bestMod,false);
        r.homeTeam=ht;r.awayTeam=at;r.winner=r.out==='H'?ht:at;
        results[m.id]=r;
      });
    });
  }
  var fin=DATA.matches.find(function(m){return m.phase==='final';});
  return {standings:standings,results:results,thirds:thirds,
          champion:fin&&results[fin.id]?results[fin.id].winner:'?',
          incomplete:!complete};
}
function _sonSimHybrid(match, modelIds, allowDraw, friendPickMap){
  var pickStr=(friendPickMap||{})[String(match.id)]||(friendPickMap||{})[String(match.num)];
  if(pickStr){
    var pp=pickStr.split('-');
    var hg=parseInt(pp[0],10)||0,ag=parseInt(pp[1],10)||0;
    var out=hg>ag?'H':hg<ag?'A':'D';
    if(!allowDraw&&out==='D'){
      var av=_sonAvg(match,modelIds.length?modelIds:['weighted_points_ensemble']);
      out=av.p1>=av.p2?'H':'A';
    }
    return {hg:hg,ag:ag,out:out};
  }
  return _sonSim(match,modelIds.length?modelIds:['weighted_points_ensemble'],allowDraw);
}
function runSonSimulation(modelIds, friendPickMap){
  friendPickMap=friendPickMap||{};
  var effectiveModels=modelIds.length?modelIds:['weighted_points_ensemble'];
  var results={},standings={},teamStats={};
  // Fase de grupos
  DATA.matches.filter(function(m){return m.phase==='group';}).forEach(function(m){
    ['home','away'].forEach(function(s){
      if(!teamStats[m[s]]) teamStats[m[s]]={team:m[s],pts:0,gf:0,ga:0,gd:0,group:m.group};
    });
    var r=_sonSimHybrid(m,effectiveModels,true,friendPickMap); results[m.id]=r;
    var h=teamStats[m.home],a=teamStats[m.away];
    h.gf+=r.hg;h.ga+=r.ag;h.gd+=r.hg-r.ag;
    a.gf+=r.ag;a.ga+=r.hg;a.gd+=r.ag-r.hg;
    if(r.out==='H'){h.pts+=3;}else if(r.out==='D'){h.pts++;a.pts++;}else{a.pts+=3;}
  });
  Object.values(teamStats).forEach(function(t){
    if(!standings[t.group]) standings[t.group]=[];
    standings[t.group].push(t);
  });
  Object.keys(standings).forEach(function(g){
    standings[g].sort(function(a,b){return (b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf);});
  });
  // Top 8 terceros
  var thirds=Object.keys(standings).map(function(g){
    return Object.assign({},standings[g][2],{group:g});
  }).sort(function(a,b){return (b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf);}).slice(0,8);
  var usedT={};
  // Resolver nombre de equipo
  function resolve(name){
    if(!name) return '?';
    var m2;
    m2=name.match(/^Winner Group ([A-L])$/);
    if(m2) return ((standings[m2[1]]||[])[0]||{}).team||name;
    m2=name.match(/^Runner-up Group ([A-L])$/);
    if(m2) return ((standings[m2[1]]||[])[1]||{}).team||name;
    m2=name.match(/^3rd Group (.+)$/);
    if(m2){
      var eligible=m2[1].split('/');
      for(var i=0;i<thirds.length;i++){
        if(eligible.indexOf(thirds[i].group)>=0&&!usedT[thirds[i].team]){
          usedT[thirds[i].team]=true; return thirds[i].team;
        }
      }
      return name;
    }
    m2=name.match(/^Winner Match (\d+)$/);
    if(m2){var r2=results[+m2[1]];return r2?r2.winner||name:name;}
    return name;
  }
  // Fases eliminatorias
  ['r32','r16','qf','sf','third','final'].forEach(function(phase){
    DATA.matches.filter(function(m){return m.phase===phase;}).forEach(function(m){
      var ht=resolve(m.home),at=resolve(m.away);
      var r=_sonSimHybrid(m,effectiveModels,false,friendPickMap);
      r.homeTeam=ht; r.awayTeam=at;
      r.winner=r.out==='H'?ht:at;
      results[m.id]=r;
    });
  });
  var fin=DATA.matches.find(function(m){return m.phase==='final';});
  return {standings:standings,results:results,thirds:thirds,
          champion:fin&&results[fin.id]?results[fin.id].winner:'?'};
}

/* ══════════════════ RENDER: SOÑADORA ══════════════════ */
function renderSonadora(){
  var el=document.getElementById('sec-sonadora');
  var allModels=[];
  DATA.matches.forEach(function(m){
    (m.models||[]).forEach(function(mod){
      if(!allModels.find(function(x){return x.id===mod.id;}))
        allModels.push({id:mod.id});
    });
  });
  // Ordenar por rendimiento de backtest (pts desc), modelos sin backtest al final
  var btMap={};
  (DATA.backtest.metrics||[]).forEach(function(bm){btMap[bm.model]=bm.pts;});
  allModels.sort(function(a,b){
    var pa=btMap[a.id]!=null?btMap[a.id]:-1;
    var pb=btMap[b.id]!=null?btMap[b.id]:-1;
    return pb-pa;
  });
  var chips=allModels.map(function(mod){
    var pts=btMap[mod.id];
    var label=modelDisplayName(mod.id)+(pts!=null?' <span style="font-size:9px;opacity:.7">'+pts+'p</span>':'');
    return '<button class="son-chip" data-mid="'+mod.id+'" onclick="_sonToggle(this)" title="'+mod.id+'">'+
      label+'</button>';
  }).join('');
  var friendSection='';
  var friendsWithPicks=(DATA.friends||[]).filter(function(f){return Object.keys(f.picks||{}).length>0;});
  if(friendsWithPicks.length){
    var fchips=friendsWithPicks.map(function(f){
      var n=Object.keys(f.picks||{}).length;
      return '<button class="son-chip son-chip-friend" data-fid="'+f.id+'" onclick="_sonToggle(this)" title="'+esc(f.name)+' ('+n+' picks)">'+
        esc(f.name)+' <span style="font-size:9px;opacity:.7">'+n+'p</span></button>';
    }).join('');
    friendSection=
      '<div style="margin-top:12px;font-size:10px;color:var(--mutl);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Amigos</div>'+
      '<div class="son-chips">'+fchips+'</div>';
  }
  el.innerHTML=
    '<div style="padding:20px 20px 0">'+
    '<div class="sdiv"><div class="sdiv-t">Soñadora · Simulación del Torneo</div><div class="sdiv-l"></div></div>'+
    '<div style="font-size:12px;color:var(--mutl);margin:6px 0 10px">'+
    'Selecciona modelos y/o amigos para simular el torneo. Los picks de amigos tienen prioridad; '+
    'partidos sin pick usan el modelo de respaldo.</div>'+
    '<div style="font-size:10px;color:var(--mutl);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Modelos</div>'+
    '<div class="son-chips">'+chips+'</div>'+
    friendSection+
    '</div>'+
    '<div id="son-result" style="padding:8px 20px 28px"><div class="son-empty">Selecciona al menos un modelo o amigo para ver la simulación.</div></div>';
}
function _sonToggle(btn){
  btn.classList.toggle('active');
  _sonRender();
}
function _sonRender(){
  var selModels=Array.from(document.querySelectorAll('.son-chip[data-mid].active')).map(function(b){return b.dataset.mid;});
  var selFriends=Array.from(document.querySelectorAll('.son-chip[data-fid].active')).map(function(b){return b.dataset.fid;});
  var el=document.getElementById('son-result');
  if(!selModels.length&&!selFriends.length){el.innerHTML='<div class="son-empty">Selecciona al menos un modelo o amigo para ver la simulación.</div>';return;}
  var friendPickMap={};
  if(selFriends.length&&DATA.friends){
    selFriends.forEach(function(fid){
      var f=DATA.friends.find(function(x){return x.id===fid;});
      if(f&&f.picks) Object.keys(f.picks).forEach(function(k){if(!friendPickMap[k]) friendPickMap[k]=f.picks[k];});
    });
  }
  var friendOnlyMode=(selModels.length===0&&selFriends.length>0);
  var sim;
  if(friendOnlyMode){
    var totalPicks=Object.keys(friendPickMap).length;
    if(totalPicks===0){
      el.innerHTML='<div class="son-empty">'+
        (selFriends.length===1?'Este amigo':'Estos amigos')+
        ' aún no ha registrado ningún pronóstico.</div>';
      return;
    }
    sim=runSonFriendSimulation(friendPickMap);
  } else {
    sim=runSonSimulation(selModels,friendPickMap);
  }
  var html=sim.incomplete?'':'<div class="son-champion"><div class="son-champ-label">🏆 Campeón Simulado</div><div class="son-champ-name">'+esc(sim.champion)+'</div></div>';
  // Grupos
  var groupKeys=Object.keys(sim.standings).sort();
  if(groupKeys.length){
  html+='<div class="sdiv"><div class="sdiv-t">Fase de Grupos</div><div class="sdiv-l"></div></div>';
  html+='<div class="son-groups">';
  groupKeys.forEach(function(g){
    html+='<div class="son-group"><div class="son-g-hd">GRUPO '+g+'</div>';
    sim.standings[g].forEach(function(t,i){
      var isT3=sim.thirds.findIndex(function(q){return q.team===t.team;})>=0;
      var cls=i<2?'q':(isT3?'t3':'out');
      var icon=i===0?'①':i===1?'②':(isT3?'✦':'·');
      html+='<div class="son-g-row '+cls+'">'+
        '<span class="son-g-pos">'+icon+'</span>'+
        '<span class="son-g-team" title="'+esc(t.team)+'">'+esc(t.team)+'</span>'+
        '<span class="son-g-pts">'+t.pts+'p</span>'+
        '<span class="son-g-gd">'+(t.gd>=0?'+':'')+t.gd+'</span></div>';
    });
    html+='</div>';
  });
  html+='</div>';
  } // end groupKeys.length
  // Eliminatorias
  if(sim.incomplete){
    html+='<div style="margin-top:16px;padding:12px 16px;background:var(--pan2);border:1px solid var(--brd);border-radius:var(--rmd);font-size:12px;color:var(--mutl)">'+
      'ℹ️ &nbsp;Las fases eliminatorias no están disponibles hasta que se completen los pronósticos de toda la fase de grupos ('+
      Object.keys(sim.standings).length+'/12 grupos con datos).</div>';
  } else {
    [{id:'r32',label:'Dieciseisavos de Final'},{id:'r16',label:'Octavos de Final'},
     {id:'qf',label:'Cuartos de Final'},{id:'sf',label:'Semifinales'},
     {id:'third',label:'Tercer Puesto'},{id:'final',label:'FINAL'}
    ].forEach(function(ph){
      var pms=DATA.matches.filter(function(m){return m.phase===ph.id;});
      if(!pms.length) return;
      html+='<div class="sdiv" style="margin-top:16px"><div class="sdiv-t">'+ph.label+'</div><div class="sdiv-l"></div></div>';
      html+='<div class="son-bracket">';
      pms.forEach(function(m){
        var r=sim.results[m.id]; if(!r) return;
        var hw=r.out==='H',aw=r.out==='A';
        html+='<div class="son-match">'+
          '<span class="son-m-n">'+m.num+'</span>'+
          '<span class="son-m-t'+(hw?' win':'')+'">'+esc(r.homeTeam||m.home)+'</span>'+
          '<span class="son-m-sc">'+r.hg+'-'+r.ag+'</span>'+
          '<span class="son-m-t r'+(aw?' win':'')+'">'+esc(r.awayTeam||m.away)+'</span>'+
          '</div>';
      });
      html+='</div>';
    });
  }
  el.innerHTML=html;
}
</script>
